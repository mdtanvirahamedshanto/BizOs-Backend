# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Set secrets via environment or a .env.production file (never commit secrets).

services:
  api:
    environment:
      NODE_ENV: production
      ENABLE_SWAGGER: 'false'
      LOG_LEVEL: warn
      RATE_LIMIT_MAX_REQUESTS: 200
      # Ensure DATABASE_URL includes ?connection_limit=5&pool_timeout=10 for low-resource environments
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:?STORAGE_ENDPOINT is required}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:?STORAGE_ACCESS_KEY is required}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY is required}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  worker:
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

  bot:
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bizos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-bizos_prod}
    ports: []

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports: []

  minio:
    ports: []
