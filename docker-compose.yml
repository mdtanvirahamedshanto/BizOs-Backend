# BizOS local / staging stack
# Usage: docker compose up -d
# API: http://localhost:3000  |  MinIO console: http://localhost:9001

services:
  postgres:
    image: postgres:16-alpine
    container_name: bizos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bizos
      POSTGRES_PASSWORD: bizos_secret
      POSTGRES_DB: bizos_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bizos -d bizos_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bizos-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: bizos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: bizos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/bizos-uploads &&
      mc anonymous set download local/bizos-uploads || true
      "
    restart: 'no'

  api:
    build:
      context: .
      target: production
    container_name: bizos-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://bizos:bizos_secret@postgres:5432/bizos_dev?schema=public&connection_limit=10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      JWT_ACCESS_SECRET: dev-access-secret-min-32-chars-long!!
      JWT_REFRESH_SECRET: dev-refresh-secret-min-32-chars-long!
      CORS_ORIGINS: http://localhost:3001,http://localhost:5173
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: bizos-uploads
      STORAGE_REGION: us-east-1
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000/bizos-uploads
      ENABLE_SWAGGER: 'true'
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  worker:
    build:
      context: .
      target: production
    container_name: bizos-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://bizos:bizos_secret@postgres:5432/bizos_dev?schema=public&connection_limit=5
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      JWT_ACCESS_SECRET: dev-access-secret-min-32-chars-long!!
      JWT_REFRESH_SECRET: dev-refresh-secret-min-32-chars-long!
      LOG_LEVEL: info
    command: ['node', 'dist/workers/index.js']

  bot:
    build:
      context: .
      target: production
    container_name: bizos-bot
    restart: unless-stopped
    profiles: ['bot']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://bizos:bizos_secret@postgres:5432/bizos_dev?schema=public&connection_limit=3
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: dev-access-secret-min-32-chars-long!!
      JWT_REFRESH_SECRET: dev-refresh-secret-min-32-chars-long!
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    command: ['node', 'dist/bot/index.js']

volumes:
  postgres_data:
  redis_data:
  minio_data:
